<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0a0a0f">
<meta name="description" content="PULSE — Live News">
<title>PULSE — Live News</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
[data-theme="dark"] {
  --bg:#0a0a0f; --bg2:#111118; --bg3:#1a1a24;
  --card:#13131c; --card-h:#17171f;
  --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.13);
  --text:#e8e8f0; --text2:#b0b0c0; --muted:#6b6b80;
  --shadow:rgba(0,0,0,0.5);
  --tech:#00d4ff; --world:#ff6b35; --finance:#00ff88;
}
[data-theme="light"] {
  --bg:#f5f4f0; --bg2:#eceae4; --bg3:#e2e0d8;
  --card:#ffffff; --card-h:#f9f8f5;
  --border:rgba(0,0,0,0.08); --border2:rgba(0,0,0,0.16);
  --text:#1a1a1a; --text2:#3a3a3a; --muted:#888880;
  --shadow:rgba(0,0,0,0.1);
  --tech:#0088cc; --world:#cc4400; --finance:#007744;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden;transition:background .3s,color .3s;}

/* HEADER */
header{position:sticky;top:0;z-index:100;border-bottom:1px solid var(--border);padding:0 16px;}
[data-theme="dark"] header{background:rgba(10,10,15,0.94);backdrop-filter:blur(20px);}
[data-theme="light"] header{background:rgba(245,244,240,0.94);backdrop-filter:blur(20px);}

.header-top{display:flex;align-items:center;justify-content:space-between;padding:12px 0 8px;gap:10px;}
.logo{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:4px;}
[data-theme="dark"] .logo{background:linear-gradient(135deg,#fff,#6b6b80);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
[data-theme="light"] .logo{background:linear-gradient(135deg,#1a1a1a,#888880);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}

.header-right{display:flex;align-items:center;gap:8px;}
.live-badge{display:flex;align-items:center;gap:5px;font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--finance);letter-spacing:2px;}
.live-dot{width:5px;height:5px;background:var(--finance);border-radius:50%;animation:pdot 1.5s infinite;}
@keyframes pdot{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.4;transform:scale(.7);}}

.clock{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);}

/* THEME TOGGLE */
.theme-toggle{width:46px;height:25px;background:var(--bg3);border:1px solid var(--border2);border-radius:20px;cursor:pointer;position:relative;transition:all .3s;flex-shrink:0;}
.theme-toggle::after{content:'';position:absolute;top:3px;left:3px;width:17px;height:17px;border-radius:50%;background:var(--muted);transition:all .3s;}
[data-theme="light"] .theme-toggle::after{transform:translateX(21px);background:var(--text);}
.t-icon{position:absolute;top:50%;transform:translateY(-50%);font-size:9px;pointer-events:none;}
.t-icon.moon{left:4px;} .t-icon.sun{right:4px;}

/* SEARCH */
.search-wrap{padding:8px 0;position:relative;}
.search-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:9px 36px 9px 14px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text);outline:none;transition:all .2s;}
.search-input::placeholder{color:var(--muted);}
.search-input:focus{border-color:var(--border2);}
.s-icon{position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:13px;pointer-events:none;}
.s-clear{position:absolute;right:10px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:17px;cursor:pointer;background:none;border:none;display:none;padding:2px 5px;}

/* TABS */
.tabs{display:flex;overflow-x:auto;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{flex-shrink:0;padding:8px 18px;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:1.5px;color:var(--muted);cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;transition:all .2s;text-transform:uppercase;}
.tab.at{color:var(--tech);border-bottom-color:var(--tech);}
.tab.aw{color:var(--world);border-bottom-color:var(--world);}
.tab.af{color:var(--finance);border-bottom-color:var(--finance);}
.tab.as{color:var(--text);border-bottom-color:var(--text);}

/* TICKER */
.ticker-wrap{background:var(--bg2);border-bottom:1px solid var(--border);overflow:hidden;padding:7px 0;}
.ticker{display:flex;gap:48px;animation:tick 40s linear infinite;white-space:nowrap;}
@keyframes tick{0%{transform:translateX(0);}100%{transform:translateX(-50%);}}
.ticker-item{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);flex-shrink:0;}
.ticker-item span{color:var(--finance);margin-right:4px;}

/* FILTER BAR */
.filter-bar{display:flex;gap:8px;padding:12px 16px 0;overflow-x:auto;scrollbar-width:none;}
.filter-bar::-webkit-scrollbar{display:none;}
.chip{flex-shrink:0;padding:5px 12px;border-radius:20px;font-size:10px;font-family:'JetBrains Mono',monospace;cursor:pointer;border:1px solid var(--border);background:var(--bg2);color:var(--muted);transition:all .2s;}
.chip.active{background:var(--bg3);color:var(--text);border-color:var(--border2);}

/* MAIN */
main{position:relative;z-index:1;padding:12px 16px 90px;max-width:680px;margin:0 auto;}

.cat-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border);}
.cat-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px;}
.cat-title.tech{color:var(--tech);} .cat-title.world{color:var(--world);} .cat-title.finance{color:var(--finance);} .cat-title.saved{color:var(--text);}
.h-right{display:flex;align-items:center;gap:8px;}
.count{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted);background:var(--bg3);padding:3px 8px;border-radius:20px;border:1px solid var(--border);}
.ref-btn{background:none;border:1px solid var(--border);color:var(--muted);padding:5px 10px;border-radius:6px;font-family:'JetBrains Mono',monospace;font-size:11px;cursor:pointer;transition:all .2s;}
.ref-btn:hover{border-color:var(--text);color:var(--text);}
.ref-btn.spin{animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* CARDS */
.news-grid{display:flex;flex-direction:column;gap:10px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 14px 14px 17px;transition:all .2s;animation:fadeUp .35s ease forwards;opacity:0;position:relative;overflow:hidden;}
.card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:12px 0 0 12px;}
.card.tech::before{background:var(--tech);} .card.world::before{background:var(--world);} .card.finance::before{background:var(--finance);}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.card:hover{border-color:var(--border2);transform:translateY(-1px);box-shadow:0 4px 20px var(--shadow);background:var(--card-h);}

.card-top{display:flex;align-items:center;gap:6px;margin-bottom:7px;}
.src-badge{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:1px;text-transform:uppercase;padding:2px 7px;border-radius:4px;font-weight:600;}
.src-badge.tech{background:rgba(0,212,255,0.1);color:var(--tech);}
.src-badge.world{background:rgba(255,107,53,0.1);color:var(--world);}
.src-badge.finance{background:rgba(0,255,136,0.1);color:var(--finance);}
.new-pill{font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;letter-spacing:1px;background:var(--world);color:#fff;padding:2px 5px;border-radius:3px;}
.card-time{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted);margin-left:auto;}
.card-title{font-size:14px;font-weight:600;line-height:1.45;color:var(--text);margin-bottom:5px;}
.card-desc{font-size:12px;color:var(--muted);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.card-actions{display:flex;align-items:center;gap:6px;margin-top:10px;padding-top:8px;border-top:1px solid var(--border);}
.c-btn{background:none;border:none;color:var(--muted);cursor:pointer;padding:3px 7px;border-radius:4px;transition:all .15s;font-family:'JetBrains Mono',monospace;font-size:10px;display:flex;align-items:center;gap:3px;}
.c-btn:hover{color:var(--text);background:var(--bg3);}
.c-btn.saved-on{color:var(--finance);}
.read-lnk{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);text-decoration:none;display:flex;align-items:center;gap:3px;transition:color .2s;}
.read-lnk:hover{color:var(--text);}

/* EMPTY / ERROR */
.empty{text-align:center;padding:50px 20px;color:var(--muted);}
.empty .ico{font-size:34px;margin-bottom:12px;}
.empty p{font-size:13px;line-height:1.6;}
.retry{background:var(--bg3);border:1px solid var(--border2);color:var(--text);padding:9px 18px;border-radius:8px;font-size:13px;cursor:pointer;margin-top:14px;}

/* SKELETON */
.skel-wrap{display:flex;flex-direction:column;gap:10px;}
.skel{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;}
.sl{height:9px;background:var(--bg3);border-radius:4px;margin-bottom:8px;animation:shim 1.4s ease infinite;}
@keyframes shim{0%,100%{opacity:.4;}50%{opacity:.8;}}
.sl.s{width:35%;} .sl.m{width:65%;} .sl.l{width:90%;} .sl.xl{width:100%;}

/* BOTTOM BAR */
.bot-bar{position:fixed;bottom:0;left:0;right:0;border-top:1px solid var(--border);display:flex;justify-content:space-around;padding:10px 0 14px;z-index:100;}
[data-theme="dark"] .bot-bar{background:rgba(10,10,15,0.95);backdrop-filter:blur(20px);}
[data-theme="light"] .bot-bar{background:rgba(245,244,240,0.95);backdrop-filter:blur(20px);}
.bot-btn{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;padding:4px 14px;border-radius:8px;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:2px;}
.bot-btn span{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:.5px;}
.bot-btn.on{color:var(--finance);}

/* INSTALL */
.inst-banner{display:none;position:fixed;bottom:75px;left:16px;right:16px;background:var(--bg3);border:1px solid var(--border2);border-radius:12px;padding:12px 14px;z-index:200;align-items:center;gap:10px;box-shadow:0 8px 32px var(--shadow);}
.inst-banner.show{display:flex;}
.inst-text{flex:1;}
.inst-text strong{font-size:13px;display:block;margin-bottom:2px;}
.inst-text small{font-size:11px;color:var(--muted);}
.inst-btn{background:var(--finance);color:#000;border:none;padding:7px 14px;border-radius:7px;font-weight:700;font-size:12px;cursor:pointer;flex-shrink:0;}
.close-b{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;}

/* TOAST */
.toast{position:fixed;bottom:85px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--bg3);border:1px solid var(--border2);color:var(--text);padding:9px 18px;border-radius:30px;font-size:12px;font-family:'JetBrains Mono',monospace;opacity:0;transition:all .3s;z-index:300;white-space:nowrap;box-shadow:0 4px 20px var(--shadow);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* SEARCH LABEL */
.srch-label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:1px;margin-bottom:12px;padding:6px 0;border-bottom:1px solid var(--border);}
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="logo">PULSE</div>
    <div class="live-badge"><div class="live-dot"></div>LIVE</div>
    <div class="header-right">
      <div class="clock" id="clock">--:--</div>
      <button class="theme-toggle" onclick="toggleTheme()">
        <span class="t-icon moon">🌙</span>
        <span class="t-icon sun">☀️</span>
      </button>
    </div>
  </div>
  <div class="search-wrap">
    <input class="search-input" id="srchIn" type="text" placeholder="Search news..." oninput="handleSearch(this.value)">
    <span class="s-icon" id="sIcon">🔍</span>
    <button class="s-clear" id="sClear" onclick="clearSearch()">×</button>
  </div>
  <div class="tabs">
    <button class="tab at" onclick="switchTab('tech')">⚡ Tech</button>
    <button class="tab"    onclick="switchTab('world')">🌍 World</button>
    <button class="tab"    onclick="switchTab('finance')">📈 Finance</button>
    <button class="tab"    onclick="switchTab('saved')">🔖 Saved</button>
  </div>
</header>

<div class="ticker-wrap">
  <div class="ticker" id="ticker">
    <span class="ticker-item"><span>PULSE</span>Loading live news...</span>
    <span class="ticker-item"><span>TECH</span>Fetching updates...</span>
    <span class="ticker-item"><span>WORLD</span>Global headlines...</span>
    <span class="ticker-item"><span>PULSE</span>Loading live news...</span>
    <span class="ticker-item"><span>TECH</span>Fetching updates...</span>
    <span class="ticker-item"><span>WORLD</span>Global headlines...</span>
  </div>
</div>

<div class="filter-bar" id="filterBar"></div>

<main>
  <div class="cat-header">
    <div class="cat-title tech" id="catTitle">⚡ TECHNOLOGY</div>
    <div class="h-right">
      <span class="count" id="countBadge">—</span>
      <button class="ref-btn" id="refBtn" onclick="refreshCurrent()">↻</button>
    </div>
  </div>
  <div id="container"></div>
</main>

<div class="bot-bar">
  <button class="bot-btn" id="notifBtn" onclick="toggleNotif()">🔔<span>ALERTS</span></button>
  <button class="bot-btn" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑<span>TOP</span></button>
  <button class="bot-btn" onclick="shareApp()">🔗<span>SHARE</span></button>
</div>

<div class="inst-banner" id="instBanner">
  <div class="inst-text"><strong>Install PULSE</strong><small>Home screen + offline</small></div>
  <button class="inst-btn" id="instBtn">Install</button>
  <button class="close-b" onclick="document.getElementById('instBanner').classList.remove('show')">×</button>
</div>

<div class="toast" id="toast"></div>

<script>
const PROXY = 'https://api.rss2json.com/v1/api.json?rss_url=';
const SOURCES = {
  tech:[
    {name:'TechCrunch', url:'https://techcrunch.com/feed/'},
    {name:'The Verge',  url:'https://www.theverge.com/rss/index.xml'},
    {name:'Ars Technica',url:'https://feeds.arstechnica.com/arstechnica/index'},
  ],
  world:[
    {name:'BBC News',  url:'https://feeds.bbci.co.uk/news/world/rss.xml'},
    {name:'Reuters',   url:'https://feeds.reuters.com/reuters/worldNews'},
    {name:'Al Jazeera',url:'https://www.aljazeera.com/xml/rss/all.xml'},
  ],
  finance:[
    {name:'CoinDesk',    url:'https://www.coindesk.com/arc/outboundfeeds/rss/'},
    {name:'MarketWatch', url:'https://feeds.content.dowjones.io/public/rss/mw_realtimeheadlines'},
    {name:'Reuters Biz', url:'https://feeds.reuters.com/reuters/businessNews'},
  ]
};
const CATS = {
  tech:{label:'⚡ TECHNOLOGY',cls:'tech'},
  world:{label:'🌍 WORLD NEWS',cls:'world'},
  finance:{label:'📈 FINANCE',cls:'finance'},
  saved:{label:'🔖 SAVED',cls:'saved'}
};

let cur='tech', cache={tech:[],world:[],finance:[]};
let bookmarks=JSON.parse(localStorage.getItem('bm')||'[]');
let seenLinks=new Set(JSON.parse(localStorage.getItem('sl')||'[]'));
let notifOn=false, autoT=null, dp=null, curFilter='ALL';
let isDark=localStorage.getItem('theme')!=='light';

document.documentElement.setAttribute('data-theme',isDark?'dark':'light');
updateClock(); setInterval(updateClock,1000);
fetchNews('tech');

function updateClock(){
  document.getElementById('clock').textContent=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
}

function toggleTheme(){
  isDark=!isDark;
  document.documentElement.setAttribute('data-theme',isDark?'dark':'light');
  localStorage.setItem('theme',isDark?'dark':'light');
  toast(isDark?'🌙 Dark mode':'☀️ Light mode');
}

function switchTab(tab){
  cur=tab; curFilter='ALL';
  document.getElementById('srchIn').value='';
  handleSearch('');

  document.querySelectorAll('.tab').forEach(t=>t.className='tab');
  const tmap=['tech','world','finance','saved'];
  const clsmap={tech:'at',world:'aw',finance:'af',saved:'as'};
  const tabs=document.querySelectorAll('.tab');
  const i=tmap.indexOf(tab);
  if(i>=0) tabs[i].className=`tab ${clsmap[tab]}`;

  const info=CATS[tab];
  const el=document.getElementById('catTitle');
  el.textContent=info.label; el.className=`cat-title ${info.cls}`;

  if(tab==='saved'){renderSaved();buildFilters([]);return;}
  if(cache[tab].length){buildFilters(cache[tab]);renderCards(cache[tab],tab);}
  else fetchNews(tab);
}

async function fetchNews(tab){
  showLoading();
  let all=[];
  for(const src of SOURCES[tab]){
    try{
      const r=await fetch(`${PROXY}${encodeURIComponent(src.url)}&count=12`);
      const d=await r.json();
      if(d.status==='ok'&&d.items) all=all.concat(d.items.map(i=>({...i,sourceName:src.name,category:tab})));
    }catch(e){}
  }
  if(!all.length){showError(tab);return;}
  const seen=new Set();
  all=all.filter(i=>{if(seen.has(i.link))return false;seen.add(i.link);return true;})
         .sort((a,b)=>new Date(b.pubDate)-new Date(a.pubDate));
  const newI=all.filter(i=>!seenLinks.has(i.link));
  if(newI.length&&notifOn) sendNotif(newI[0],tab);
  all.forEach(i=>seenLinks.add(i.link));
  localStorage.setItem('sl',JSON.stringify([...seenLinks].slice(-300)));
  cache[tab]=all;
  updateTicker(all,tab);
  buildFilters(all);
  renderCards(all,tab);
}

function buildFilters(items){
  const bar=document.getElementById('filterBar');
  if(!items.length){bar.innerHTML='';return;}
  const srcs=['ALL',...new Set(items.map(i=>i.sourceName))];
  bar.innerHTML=srcs.map(s=>`<button class="chip ${curFilter===s?'active':''}" onclick="setFilter('${s}')">${s}</button>`).join('');
}

function setFilter(s){
  curFilter=s;
  buildFilters(cache[cur]);
  const filtered=s==='ALL'?cache[cur]:cache[cur].filter(i=>i.sourceName===s);
  renderCards(filtered,cur);
}

function renderCards(items,tab){
  const c=document.getElementById('container');
  document.getElementById('countBadge').textContent=`${items.length} articles`;
  if(!items.length){
    c.innerHTML=`<div class="empty"><div class="ico">🔍</div><p>No articles found.</p></div>`;
    return;
  }
  c.innerHTML=`<div class="news-grid">${items.map((item,i)=>{
    const cat=item.category||tab;
    const ago=timeAgo(item.pubDate);
    const desc=(item.description||'').replace(/<[^>]*>/g,'').trim().slice(0,110);
    const sv=bookmarks.some(b=>b.link===item.link);
    const safeTitle=item.title.replace(/'/g,"&#39;");
    const safeLink=encodeURIComponent(item.link);
    return `<div class="card ${cat}" style="animation-delay:${i*.04}s">
      <div class="card-top">
        <span class="src-badge ${cat}">${item.sourceName}</span>
        ${i<3?'<span class="new-pill">NEW</span>':''}
        <span class="card-time">${ago}</span>
      </div>
      <div class="card-title">${item.title}</div>
      ${desc?`<div class="card-desc">${desc}...</div>`:''}
      <div class="card-actions">
        <button class="c-btn ${sv?'saved-on':''}" onclick="toggleBM(event,${i},'${tab}')">
          🔖 ${sv?'Saved':'Save'}
        </button>
        <button class="c-btn" onclick="shareItem(event,'${safeTitle}','${safeLink}')">
          🔗 Share
        </button>
        <a class="read-lnk" href="${item.link}" target="_blank" rel="noopener">Read →</a>
      </div>
    </div>`;
  }).join('')}</div>`;
}

function renderSaved(){
  const c=document.getElementById('container');
  document.getElementById('countBadge').textContent=`${bookmarks.length} saved`;
  if(!bookmarks.length){
    c.innerHTML=`<div class="empty"><div class="ico">🔖</div><p>No saved articles yet.<br>Tap 🔖 on any article!</p></div>`;
    return;
  }
  c.innerHTML=`<div class="news-grid">${bookmarks.map((item,i)=>{
    const cat=item.category||'tech';
    const ago=timeAgo(item.pubDate);
    const desc=(item.descriptio
